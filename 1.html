<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pepe Turbo Racer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; touch-action:none; }
  canvas { display:block; width:100%; height:100%; }

  .overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
    color:#fff; z-index:10; transition:opacity 0.4s;
  }
  .overlay.hidden { opacity:0; pointer-events:none; }
  .overlay h1 {
    font-size:clamp(32px,8vw,72px); font-weight:900;
    background:linear-gradient(135deg,#ff6b35,#f7c948);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:none; margin-bottom:4px;
  }
  .overlay .subtitle { color:#aaa; font-size:clamp(12px,2.5vw,20px); margin-bottom:24px; letter-spacing:2px; }
  .overlay .high-scores { color:#888; font-size:clamp(11px,2vw,16px); margin-top:16px; }
  .overlay .high-scores span { color:#f7c948; }

  .btn {
    padding:14px 48px; font-size:clamp(16px,3vw,24px); font-weight:700; border:none; border-radius:50px;
    cursor:pointer; transition:transform 0.15s,box-shadow 0.15s;
    background:linear-gradient(135deg,#ff6b35,#f7c948); color:#1a1a2e;
    box-shadow:0 4px 24px rgba(255,107,53,0.4); letter-spacing:1px;
  }
  .btn:active { transform:scale(0.95); box-shadow:0 2px 12px rgba(255,107,53,0.3); }
  .btn-secondary { background:rgba(255,255,255,0.12); color:#fff; box-shadow:none; padding:10px 32px; font-size:clamp(13px,2vw,18px); }
  .btn-secondary:active { background:rgba(255,255,255,0.2); }

  #gameUI { position:absolute; top:0; left:0; width:100%; height:100%; z-index:5; pointer-events:none; }
  #gameUI > * { pointer-events:auto; }

  /* Top-left: Life bar + Score */
  #leftPanel {
    position:absolute; top:clamp(10px,2.5vw,18px); left:clamp(10px,2.5vw,18px);
    display:flex; flex-direction:column; gap:6px;
  }
  #lifeCorner {
    display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.4);
    padding:6px 12px; border-radius:8px; backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,0.1);
  }
  #lifeCornerLabel {
    font-size:clamp(9px,1.4vw,11px); color:rgba(255,255,255,0.6);
    text-transform:uppercase; letter-spacing:1px; font-weight:600;
  }
  #lifeCornerBar {
    width:clamp(60px,12vw,100px); height:6px; background:rgba(255,255,255,0.12);
    border-radius:3px; overflow:hidden;
  }
  #lifeCornerFill {
    height:100%; width:100%; border-radius:3px;
    background:linear-gradient(90deg,#ff1744,#ff6b35,#76ff03);
    transition:width 0.1s;
  }
  #scoreFrame {
    background:rgba(0,0,0,0.4); backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,0.1); border-radius:8px;
    padding:4px 12px; text-align:left;
  }
  #scoreFrameLabel {
    font-size:clamp(7px,1.2vw,10px); color:rgba(255,255,255,0.4);
    text-transform:uppercase; letter-spacing:1px;
  }
  #scoreFrameValue {
    font-size:clamp(14px,3vw,22px); font-weight:800; color:#4fc3f7;
    text-shadow:0 2px 8px rgba(0,0,0,0.6); line-height:1;
  }

  /* Bottom center: Level */
  #levelDisplay {
    position:absolute; bottom:clamp(120px,18vh,170px); left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.3); backdrop-filter:blur(4px);
    padding:4px 16px; border-radius:20px; border:1px solid rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.25); font-size:clamp(10px,1.8vw,14px);
    letter-spacing:3px; text-transform:uppercase; font-weight:600;
  }

  #touchControls {
    position:absolute; bottom:0; left:0; right:0; height:clamp(120px,18vh,160px);
    display:flex; justify-content:space-between; align-items:center;
    padding:0 8px 16px; pointer-events:none;
  }
  #touchControls > * { pointer-events:auto; }
  .touch-btn {
    width:clamp(70px,16vw,110px); height:clamp(70px,16vw,110px); border-radius:50%;
    border:2px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(28px,6vw,44px); color:#fff;
    transition:background 0.1s,transform 0.1s,border-color 0.1s;
    -webkit-tap-highlight-color:transparent; touch-action:none;
    backdrop-filter:blur(4px);
  }
  .touch-btn:active, .touch-btn.active {
    background:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.5); transform:scale(0.9);
  }
  .touch-btn-left { margin-right:auto; }
  .touch-btn-right { margin-left:auto; }
  .touch-btn-pause {
    width:clamp(44px,8vw,56px); height:clamp(44px,8vw,56px); border-radius:50%;
    border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:clamp(16px,3vw,24px); cursor:pointer;
    backdrop-filter:blur(4px);
    -webkit-tap-highlight-color:transparent; touch-action:none;
  }
  .touch-btn-pause:active {
    background:rgba(255,255,255,0.15); transform:scale(0.9);
  }

  @supports (-webkit-touch-callout:none) {
    .touch-btn { cursor:default; }
  }
</style>
</head>
<body>

<div id="menuScreen" class="overlay">
  <h1>PEPE TURBO</h1>
  <div class="subtitle">RACER</div>
  <button class="btn" id="playBtn">JUGAR</button>
  <div class="high-scores" id="menuHighScores"></div>
</div>

<div id="gameOverScreen" class="overlay hidden">
  <h1>GAME OVER</h1>
  <div class="subtitle" id="finalScoreDisplay">0</div>
  <button class="btn" id="restartBtn">REINTENTAR</button>
  <button class="btn btn-secondary" id="menuBtn">MENÚ</button>
  <div class="high-scores" id="goHighScores"></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="gameUI" style="display:none;">
  <div id="leftPanel">
    <div id="lifeCorner">
      <span id="lifeCornerLabel">VIDA</span>
      <div id="lifeCornerBar"><div id="lifeCornerFill"></div></div>
    </div>
    <div id="scoreFrame">
      <div id="scoreFrameLabel">Puntos</div>
      <div id="scoreFrameValue">0</div>
    </div>
  </div>
  <div id="levelDisplay">NIVEL 1</div>
  <div id="touchControls">
    <div class="touch-btn touch-btn-left" id="leftBtn">◀</div>
    <div class="touch-btn-pause" id="pauseBtn">⏸</div>
    <div class="touch-btn touch-btn-right" id="rightBtn">▶</div>
  </div>
</div>

<script>
// ===================== SETUP =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ===================== AVATAR =====================
const avatarImg = new Image();
avatarImg.src = 'avatar.png';
let avatarCollectedSound = null;

// ===================== AUDIO (Web Audio) =====================
let audioCtx = null;
let engineOsc = null;
let engineGain = null;
let engineNoise = null;
let engineNoiseGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  engineOsc = audioCtx.createOscillator();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 80;
  engineGain = audioCtx.createGain();
  engineGain.gain.value = 0;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 300;
  filter.Q.value = 2;
  engineOsc.connect(filter);
  filter.connect(engineGain);
  engineGain.connect(audioCtx.destination);
  engineOsc.start();

  const bufferSize = audioCtx.sampleRate * 0.5;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  engineNoise = audioCtx.createBufferSource();
  engineNoise.buffer = buffer;
  engineNoise.loop = true;
  engineNoiseGain = audioCtx.createGain();
  engineNoiseGain.gain.value = 0;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 120;
  noiseFilter.Q.value = 1.5;
  engineNoise.connect(noiseFilter);
  noiseFilter.connect(engineNoiseGain);
  engineNoiseGain.connect(audioCtx.destination);
  engineNoise.start();
  engineGain.gain.setTargetAtTime(0.08, audioCtx.currentTime, 0.1);
  engineNoiseGain.gain.setTargetAtTime(0.04, audioCtx.currentTime, 0.1);
}

function updateEngineSound(speed, maxSpeed) {
  if (!audioCtx || !engineOsc) return;
  const t = audioCtx.currentTime;
  const p = Math.min(speed / maxSpeed, 1);
  const freq = 50 + p * 180;
  const vol = 0.02 + p * 0.1;
  engineOsc.frequency.setTargetAtTime(freq, t, 0.05);
  engineGain.gain.setTargetAtTime(vol, t, 0.05);
  engineNoiseGain.gain.setTargetAtTime(vol * 0.5, t, 0.05);
}

function stopAudio() {
  if (engineOsc) { try { engineOsc.stop(); } catch(e) {} }
  if (engineNoise) { try { engineNoise.stop(); } catch(e) {} }
  if (engineGain) { try { engineGain.disconnect(); } catch(e) {} }
  if (engineNoiseGain) { try { engineNoiseGain.disconnect(); } catch(e) {} }
  audioCtx = null; engineOsc = null; engineNoise = null;
  engineGain = null; engineNoiseGain = null;
}

function playTone(freq, duration, type = 'sine', vol = 0.12) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// ===================== HIGH SCORES =====================
const STORAGE_KEY = 'pepeTuboRacer_scores';
function getHighScores() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
  catch { return []; }
}
function saveScore(score) {
  const scores = getHighScores();
  scores.push(Math.floor(score));
  scores.sort((a, b) => b - a);
  const top5 = scores.slice(0, 5);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(top5)); } catch {}
  return top5;
}
function renderHighScores(containerId) {
  const el = document.getElementById(containerId);
  const scores = getHighScores();
  if (scores.length === 0) { el.innerHTML = '🏆 Aún no hay récords'; return; }
  el.innerHTML = '🏆 RÉCORDS<br>' + scores.map((s, i) =>
    `<span>#${i + 1}: ${s.toLocaleString()}</span>`
  ).join('<br>');
}

// ===================== ROAD SYSTEM (Pseudo-3D) =====================
const SEGMENT_LENGTH = 200;
const VISIBLE_SEGMENTS = 250;
const ROAD_WIDTH = 3000;
const FOCAL_LENGTH = 400;
const CAMERA_HEIGHT = 2000;
const HORIZON_RATIO = 0.1;

let segments = [];
let segmentCurves = [];

function getCurveAt(distance) {
  const segIdx = Math.floor(distance / SEGMENT_LENGTH);
  ensureSegmentsUpTo(segIdx + 1);
  return segmentCurves[segIdx];
}

function generateSegmentCurve(index) {
  const sectionLen = 25;
  const section = Math.floor(index / sectionLen);
  const local = index - section * sectionLen;
  const pos = local / sectionLen;
  const phase = section % 7;

  let target = 0;
  if (phase === 0) target = 0;
  else if (phase === 1) target = -7;
  else if (phase === 2) target = 8;
  else if (phase === 3) target = -6;
  else if (phase === 4) target = 7;
  else if (phase === 5) target = -8;
  else if (phase === 6) target = 5;

  const blendIn = Math.min(pos / 0.2, 1);
  const blendOut = Math.min((1 - pos) / 0.2, 1);
  const strength = blendIn * blendOut;
  const noise = Math.sin(index * 0.31 + section * 0.7) * 0.3;
  return target * strength + noise;
}

function ensureSegmentsUpTo(index) {
  while (segments.length <= index) {
    const i = segments.length;
    const curve = generateSegmentCurve(i);
    segmentCurves.push(curve);
    segments.push({ index: i, curve });
  }
}

function getRoadXAt(distance) {
  const segIdx = Math.floor(distance / SEGMENT_LENGTH);
  const frac = (distance % SEGMENT_LENGTH) / SEGMENT_LENGTH;
  ensureSegmentsUpTo(segIdx + 2);
  let sum = 0;
  for (let i = 0; i < segIdx; i++) sum += segmentCurves[i];
  sum += segmentCurves[segIdx] * frac;
  return sum;
}

// ===================== PARALLAX BACKGROUND =====================
let mountainSeeds = [];
function initMountains() {
  for (let layer = 0; layer < 3; layer++) {
    mountainSeeds[layer] = [];
    for (let i = 0; i < 80; i++) {
      mountainSeeds[layer].push(Math.sin(i * 0.5 + layer * 7) * 0.5 +
        Math.sin(i * 1.3 + layer * 3) * 0.3 + Math.random() * 0.2);
    }
  }
}
initMountains();

function darkenColor(hex, factor) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.floor(r * (1 - factor))},${Math.floor(g * (1 - factor))},${Math.floor(b * (1 - factor))})`;
}

function drawMountainLayer(layer, offset, color, baseY, peakHeight) {
  const speeds = [0.02, 0.05, 0.1];
  const scroll = offset * speeds[layer];
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i < mountainSeeds[layer].length; i++) {
    const x = (i / mountainSeeds[layer].length) * W * 1.5 - (scroll * W) % (W * 1.5);
    const h = (mountainSeeds[layer][i] + 0.5) * peakHeight;
    ctx.lineTo(x, baseY - h);
  }
  ctx.lineTo(W * 1.5, H);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, baseY - peakHeight, 0, H);
  grad.addColorStop(0, color);
  grad.addColorStop(1, darkenColor(color, 0.3));
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, baseY);
  for (let i = 0; i < mountainSeeds[layer].length; i++) {
    const x = (i / mountainSeeds[layer].length) * W * 1.5 - (scroll * W) % (W * 1.5);
    const h = (mountainSeeds[layer][i] + 0.5) * peakHeight;
    ctx.lineTo(x, baseY - h);
  }
  ctx.lineTo(W * 1.5, baseY);
  ctx.strokeStyle = `rgba(255,255,255,${0.03 + layer * 0.02})`;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(0.3, '#1a1a4e');
  grad.addColorStop(0.6, '#2d1b4e');
  grad.addColorStop(0.8, '#4a1a3e');
  grad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawStars(offset) {
  for (let i = 0; i < 80; i++) {
    const seed = i * 7.3;
    const x = ((Math.sin(seed * 1.3) * 0.5 + 0.5) * W + offset * 0.01) % W;
    const y = (Math.sin(seed * 2.1) * 0.5 + 0.5) * H * 0.35;
    const size = (Math.sin(seed * 3.7 + offset * 0.001) * 0.5 + 0.5) * 2.5 + 0.5;
    const alpha = Math.sin(seed * 4.1 + offset * 0.002) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawClouds(offset) {
  const cloudPositions = [
    { x: 0.2, y: 0.12, w: 120, h: 30, speed: 0.008 },
    { x: 0.6, y: 0.08, w: 150, h: 25, speed: 0.012 },
    { x: 0.85, y: 0.15, w: 100, h: 20, speed: 0.006 },
    { x: 0.4, y: 0.05, w: 130, h: 28, speed: 0.01 }
  ];
  for (const c of cloudPositions) {
    const cx = (c.x * W + offset * c.speed * W) % (W + c.w) - c.w / 2;
    const cy = c.y * H;
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.ellipse(cx, cy, c.w / 2, c.h / 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx - c.w * 0.25, cy + c.h * 0.1, c.w * 0.35, c.h * 0.4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + c.w * 0.3, cy + c.h * 0.05, c.w * 0.3, c.h * 0.35, 0, 0, Math.PI * 2); ctx.fill();
  }
}

function drawBackground(distance) {
  drawSky();
  drawStars(distance);
  const horizonY = H * HORIZON_RATIO;
  drawMountainLayer(0, distance, '#1a1040', horizonY + 20, H * 0.2);
  drawMountainLayer(1, distance, '#0d0d2a', horizonY + 40, H * 0.15);
  drawMountainLayer(2, distance, '#0a0a1a', horizonY + 60, H * 0.1);
  drawClouds(distance);
}

// ===================== GROUND =====================
function drawGround() {
  const horizonY = H * HORIZON_RATIO;
  const grad = ctx.createLinearGradient(0, horizonY, 0, H);
  grad.addColorStop(0, '#2a3a1a');
  grad.addColorStop(0.3, '#3a5a2a');
  grad.addColorStop(1, '#4a6a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, horizonY, W, H);
}

// ===================== ROAD RENDERING =====================
let roadScreenData = [];

function buildRoadScreenData(playerPos, playerX) {
  const baseSeg = Math.floor(playerPos / SEGMENT_LENGTH);
  const frac = (playerPos % SEGMENT_LENGTH) / SEGMENT_LENGTH;
  roadScreenData = [{ worldX: 0, curve: 0 }];
  let cumCurve = 0;
  for (let i = 0; i <= VISIBLE_SEGMENTS; i++) {
    const idx = baseSeg + i;
    ensureSegmentsUpTo(idx + 1);
    const seg = segments[idx];
    if (i === 0) cumCurve = seg.curve * (1 - frac);
    else cumCurve += seg.curve;
    roadScreenData.push({ worldX: cumCurve * SEGMENT_LENGTH * 0.15, curve: seg.curve });
  }
}

function projectRoad(z, worldOffsetX) {
  const d = Math.max(z, 1);
  const scale = FOCAL_LENGTH / (FOCAL_LENGTH + d);
  const horizonY = H * HORIZON_RATIO;
  const sy = H - (H - horizonY) * (1 - scale);
  const sx = W / 2 + worldOffsetX * scale;
  const sw = ROAD_WIDTH * scale * 0.04;
  return { sx, sy, sw, scale };
}

function drawRoad(playerPos, playerX) {
  buildRoadScreenData(playerPos, playerX);
  const horizonY = H * HORIZON_RATIO;
  if (roadScreenData.length < 2) return;
  const baseSeg = Math.floor(playerPos / SEGMENT_LENGTH);
  const proj = [];
  for (let i = 0; i < roadScreenData.length; i++) {
    const z = i * SEGMENT_LENGTH;
    const worldOffset = roadScreenData[i].worldX - playerX;
    proj.push(projectRoad(z, worldOffset));
  }
  drawGround();
  for (let i = proj.length - 2; i >= 0; i--) {
    const cur = proj[i + 1];
    const next = proj[i];
    if (next.sy < horizonY) continue;
    if (cur.sy > H) continue;
    const absIdx = baseSeg + i + 1;
    const isRumble = Math.floor(absIdx / 4) % 2 === 0;
    const isLane = absIdx % 8 === 0;
    const y1 = Math.max(horizonY - 10, cur.sy);
    const y2 = Math.min(H, next.sy);
    if (y2 - y1 < 1) continue;
    function lerpSegment(a, b, t) {
      return { sx: a.sx + (b.sx - a.sx) * t, sw: a.sw + (b.sw - a.sw) * t };
    }
    const t1 = (y1 - cur.sy) / (next.sy - cur.sy || 1);
    const t2 = (y2 - cur.sy) / (next.sy - cur.sy || 1);
    const s1 = lerpSegment(cur, next, t1);
    const s2 = lerpSegment(cur, next, t2);
    const rumbleColor = isRumble ? '#cc4444' : '#444466';
    const roadColor = !isRumble ? '#555577' : '#4a4a6a';
    const rumbleW = s1.sw * 1.15;
    const rumbleW2 = s2.sw * 1.15;
    ctx.fillStyle = '#8a7a5a';
    ctx.beginPath();
    ctx.moveTo(s1.sx - rumbleW, y1); ctx.lineTo(s1.sx + rumbleW, y1);
    ctx.lineTo(s2.sx + rumbleW2, y2); ctx.lineTo(s2.sx - rumbleW2, y2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = rumbleColor;
    ctx.beginPath();
    ctx.moveTo(s1.sx - rumbleW, y1); ctx.lineTo(s1.sx - s1.sw, y1);
    ctx.lineTo(s2.sx - s2.sw, y2); ctx.lineTo(s2.sx - rumbleW2, y2);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(s1.sx + rumbleW, y1); ctx.lineTo(s1.sx + s1.sw, y1);
    ctx.lineTo(s2.sx + s2.sw, y2); ctx.lineTo(s2.sx + rumbleW2, y2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = roadColor;
    ctx.beginPath();
    ctx.moveTo(s1.sx - s1.sw, y1); ctx.lineTo(s1.sx + s1.sw, y1);
    ctx.lineTo(s2.sx + s2.sw, y2); ctx.lineTo(s2.sx - s2.sw, y2);
    ctx.closePath(); ctx.fill();
    const centerW = s1.sw * 0.85;
    const centerW2 = s2.sw * 0.85;
    ctx.fillStyle = isRumble ? '#4a4a6a' : '#606080';
    ctx.beginPath();
    ctx.moveTo(s1.sx - centerW, y1); ctx.lineTo(s1.sx + centerW, y1);
    ctx.lineTo(s2.sx + centerW2, y2); ctx.lineTo(s2.sx - centerW2, y2);
    ctx.closePath(); ctx.fill();
    if (isLane) {
      const lw = Math.max(2, s1.sw * 0.03); const lw2 = Math.max(2, s2.sw * 0.03);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.moveTo(s1.sx - lw, y1); ctx.lineTo(s1.sx + lw, y1);
      ctx.lineTo(s2.sx + lw2, y2); ctx.lineTo(s2.sx - lw2, y2);
      ctx.closePath(); ctx.fill();
    }
    if (absIdx % 2 === 0) {
      const ew = Math.max(1.5, s1.sw * 0.02); const ew2 = Math.max(1.5, s2.sw * 0.02);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.moveTo(s1.sx - s1.sw + ew, y1); ctx.lineTo(s1.sx - s1.sw + ew * 2, y1);
      ctx.lineTo(s2.sx - s2.sw + ew2 * 2, y2); ctx.lineTo(s2.sx - s2.sw + ew2, y2);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s1.sx + s1.sw - ew, y1); ctx.lineTo(s1.sx + s1.sw - ew * 2, y1);
      ctx.lineTo(s2.sx + s2.sw - ew2 * 2, y2); ctx.lineTo(s2.sx + s2.sw - ew2, y2);
      ctx.closePath(); ctx.fill();
    }
  }
}

// ===================== SCENERY =====================
function shouldHaveScenery(segIndex) {
  if (segIndex % 3 !== 0) return false;
  return Math.sin(segIndex * 7.31) * 0.5 + 0.5 > 0.45;
}
function getSceneryInfo(segIndex) {
  const seed = segIndex * 13.37;
  return {
    type: (Math.sin(seed) * 0.5 + 0.5) > 0.55 ? 'tree' : 'house',
    side: (Math.sin(seed * 1.7) * 0.5 + 0.5) > 0.5 ? 1 : -1,
    distFromRoad: 40 + (Math.sin(seed * 2.3) * 0.5 + 0.5) * 80,
    size: (Math.sin(seed * 3.1) * 0.5 + 0.5) > 0.5 ? 1 : 0.7
  };
}
function drawScenery() {
  const horizonY = H * HORIZON_RATIO;
  const baseSeg = Math.floor(playerPos / SEGMENT_LENGTH);
  const maxSeg = baseSeg + Math.min(VISIBLE_SEGMENTS, 60);
  for (let segIdx = baseSeg + 1; segIdx <= maxSeg; segIdx += 3) {
    if (!shouldHaveScenery(segIdx)) continue;
    const info = getSceneryInfo(segIdx);
    const dataIdx = segIdx - baseSeg;
    if (dataIdx < 0 || dataIdx >= roadScreenData.length) continue;
    const roadOffset = roadScreenData[dataIdx].worldX;
    const z = dataIdx * SEGMENT_LENGTH;
    const worldX = roadOffset + info.side * (ROAD_WIDTH * 0.04 + info.distFromRoad);
    const dx = worldX - playerX;
    const d = Math.max(z, 1);
    const scale = FOCAL_LENGTH / (FOCAL_LENGTH + d);
    const sy = H - (H - horizonY) * (1 - scale);
    if (sy < horizonY || sy > H) continue;
    const sx = W / 2 + dx * scale;
    if (sx < -80 || sx > W + 80) continue;
    const h = info.size * (120 * scale);
    const w = info.size * (80 * scale);
    if (info.type === 'tree') {
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(sx - w * 0.06, sy - h * 0.35, w * 0.12, h * 0.35);
      ctx.fillStyle = '#1e4a14';
      ctx.beginPath(); ctx.arc(sx, sy - h * 0.45, w * 0.35, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#2a6a1e';
      ctx.beginPath(); ctx.arc(sx - w * 0.2, sy - h * 0.3, w * 0.25, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx + w * 0.2, sy - h * 0.3, w * 0.25, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(sx - w * 0.45, sy - h * 0.6, w * 0.9, h * 0.6);
      ctx.fillStyle = '#5c3a1e';
      ctx.beginPath();
      ctx.moveTo(sx - w * 0.55, sy - h * 0.6);
      ctx.lineTo(sx, sy - h);
      ctx.lineTo(sx + w * 0.55, sy - h * 0.6);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#4a2a0a';
      ctx.fillRect(sx - w * 0.08, sy - h * 0.35, w * 0.16, h * 0.35);
      ctx.fillStyle = '#aad4e6';
      ctx.fillRect(sx + w * 0.12, sy - h * 0.5, w * 0.18, h * 0.18);
    }
  }
}

// ===================== OBSTACLES =====================
function shouldHaveObstacle(segIndex) {
  if (segIndex % 4 !== 0) return false;
  return Math.sin(segIndex * 17.31) * 0.5 + 0.5 > 0.7;
}
function getObstacleInfo(segIndex) {
  const seed = segIndex * 23.47;
  return {
    x: (Math.sin(seed) * 0.5 + 0.5 - 0.5) * ROAD_WIDTH * 0.04 * 0.6
  };
}
function drawObstacles() {
  const horizonY = H * HORIZON_RATIO;
  const baseSeg = Math.floor(playerPos / SEGMENT_LENGTH);
  const maxSeg = baseSeg + Math.min(VISIBLE_SEGMENTS, 60);
  const warnPulse = Math.sin(totalDistance * 0.15) * 0.5 + 0.5;
  const startSeg = Math.ceil((baseSeg + 1) / 4) * 4;
  for (let segIdx = startSeg; segIdx <= maxSeg; segIdx += 4) {
    if (!shouldHaveObstacle(segIdx)) continue;
    const info = getObstacleInfo(segIdx);
    const dataIdx = segIdx - baseSeg;
    if (dataIdx < 0 || dataIdx >= roadScreenData.length) continue;
    const roadOffset = roadScreenData[dataIdx].worldX;
    const z = dataIdx * SEGMENT_LENGTH;
    const worldX = roadOffset + info.x;
    const dx = worldX - playerX;
    const d = Math.max(z, 1);
    const scale = FOCAL_LENGTH / (FOCAL_LENGTH + d);
    const sy = H - (H - horizonY) * (1 - scale);
    if (sy < horizonY || sy > H) continue;
    const sx = W / 2 + dx * scale;
    if (sx < -60 || sx > W + 60) continue;
    const sz = 22 * scale;
    // Warning glow for nearby obstacles
    if (z < SEGMENT_LENGTH * 15) {
      const warnAlpha = warnPulse * 0.3 * (1 - z / (SEGMENT_LENGTH * 15));
      ctx.shadowColor = '#ff1744';
      ctx.shadowBlur = 30 * scale * warnPulse;
      ctx.strokeStyle = `rgba(255,23,68,${warnAlpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, sy - sz, sz * 1.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    // Oil drum body
    const bodyGrad = ctx.createLinearGradient(sx - sz, sy - sz * 1.8, sx + sz, sy);
    bodyGrad.addColorStop(0, '#cc3333');
    bodyGrad.addColorStop(0.5, '#ee5544');

    ctx.fillStyle = bodyGrad;
    roundRect(ctx, sx - sz, sy - sz * 1.8, sz * 2, sz * 1.8, sz * 0.2);
    ctx.fill();
    // Metal bands
    ctx.fillStyle = '#444466';
    roundRect(ctx, sx - sz * 0.95, sy - sz * 1.4, sz * 1.9, sz * 0.2, 1);
    ctx.fill();
    roundRect(ctx, sx - sz * 0.95, sy - sz * 0.6, sz * 1.9, sz * 0.2, 1);
    ctx.fill();
    // Hazard stripes

    ctx.fillRect(sx - sz * 0.8, sy - sz * 1.0, sz * 0.3, sz * 0.15);
    ctx.fillRect(sx - sz * 0.3, sy - sz * 1.0, sz * 0.6, sz * 0.15);
    ctx.fillRect(sx + sz * 0.5, sy - sz * 1.0, sz * 0.3, sz * 0.15);

    ctx.strokeStyle = '#881111';
    ctx.lineWidth = 2 * scale;
    ctx.beginPath();
    ctx.ellipse(sx, sy - sz * 1.8, sz * 0.8, sz * 0.15, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}
function checkObstacleCollision() {
  if (obstacleCooldown > 0) return false;
  const baseSeg = Math.floor(playerPos / SEGMENT_LENGTH);
  const carSeg = Math.floor((playerPos + SEGMENT_LENGTH * 2) / SEGMENT_LENGTH);
  for (let seg = carSeg - 1; seg <= carSeg + 1; seg++) {
    if (seg < 0) continue;

    const info = getObstacleInfo(seg);
    if (Math.abs(playerX - info.x) < ROAD_WIDTH * 0.04 * 0.18) {

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);

  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);

// ===================== PARTICLES =====================
let particles = [];
function emitSparks(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
      life: 1, decay: 0.02 + Math.random() * 0.03, size: 2 + Math.random() * 3,
      color: Math.random() > 0.5 ? '#ff6b35' : '#f7c948'
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

  gameRunning = false;
  stopAudio();
  const topScores = saveScore(score);
  document.getElementById('finalScoreDisplay').textContent = `PUNTUACIÓN: ${Math.floor(score).toLocaleString()}`;
  const el = document.getElementById('goHighScores');
  el.innerHTML = '🏆 RÉCORDS<br>' + topScores.map((s, i) => `<span>#${i + 1}: ${s.toLocaleString()}</span>`).join('<br>');
  document.getElementById('gameOverScreen').classList.remove('hidden');
}
function restartGame() {
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('gameUI').style.display = 'block';
  initAudio(); resetGame(); gameRunning = true; loop();
}
function goToMenu() {
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('gameUI').style.display = 'none';
  gameRunning = false;
  renderHighScores('menuHighScores');
  document.getElementById('menuScreen').classList.remove('hidden');
}
document.getElementById('playBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('menuBtn').addEventListener('click', goToMenu);

// ===================== UPDATE =====================
function update() {
  if (paused) return;
  frameCount++;

  const left = inputLeft || keyboardLeft;
  const right = inputRight || keyboardRight;

  speed += (maxSpeed - speed) * 0.02;
  if (speed < 2) speed = 2;

  const moveAmount = left ? -speed * 0.6 : (right ? speed * 0.6 : 0);
  playerX += moveAmount * 0.6;

  // Road curve drift
  const roadCurve = getCurveAt(playerPos);
  playerX -= roadCurve * speed * 0.04;

  // Car lean animation
  const targetLean = left ? -0.06 : (right ? 0.06 : 0);
  leanAngle += (targetLean - leanAngle) * 0.08;
  bouncePhase += speed * 0.08;

  // Off-road check
  const safeHalf = ROAD_WIDTH / 2 - 500;
  isOffroad = (playerX < -safeHalf || playerX > safeHalf);

  // Immediate life drain on off-road
  if (isOffroad) {
    offroadTimer++;
    life -= 3;
    shakeIntensity = Math.min(10, shakeIntensity + 0.8);
    emitSparks(W / 2 + (Math.random() - 0.5) * 100, H * 0.6, 2);
  } else {
    offroadTimer = 0;
    shakeIntensity *= 0.9;
  }
  collisionFlash *= 0.95;
  if (obstacleCooldown > 0) obstacleCooldown--;
  life = Math.max(0, Math.min(100, life));

  // Obstacle collision
  checkObstacleCollision();

  // Avatar collision
  if (checkAvatarCollision()) {
    shakeIntensity = Math.max(shakeIntensity, 3);
  }

  // Generate new avatars
  const baseSeg = Math.floor(playerPos / SEGMENT_LENGTH);
  const startSeg = Math.ceil((baseSeg + 30) / 7) * 7;
  for (let s = startSeg; s < baseSeg + 80; s += 7) {
    if (shouldHaveAvatar(s) && !avatarSegments.includes(s)) {
      generateAvatar(s);
    }
  }

  // Move forward
  playerPos += speed * 0.5;
  totalDistance += speed * 0.5;

  // Score
  score += 0.05 * (1 + speed / maxSpeed);

  // Level up
  const newLevel = Math.floor(score / 150) + 1;
  if (newLevel > level) {
    level = newLevel;
    maxSpeed = Math.min(20, 8 + level * 0.8);
    shakeIntensity = 3;
  }

  // Game over
  if (life <= 0) endGame();

  // Audio
  updateEngineSound(speed, maxSpeed);
  updateParticles();
}

// ===================== ANALOG SPEEDOMETER =====================
function drawSpeedometer() {
  const margin = Math.max(10, W * 0.025);
  const radius = Math.min(65, W * 0.08, H * 0.12);
  const cx = W - margin - radius;
  const cy = margin + radius;
  const angleStart = -Math.PI * 0.75;
  const angleEnd = Math.PI * 0.75;
  const angleRange = angleEnd - angleStart;
  const pct = Math.min(speed / maxSpeed, 1);

  // Background
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Tick marks
  for (let i = 0; i <= 10; i++) {
    const a = angleStart + (i / 10) * angleRange;
    const innerR = radius - 12;
    const outerR = i % 5 === 0 ? radius - 4 : radius - 9;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
    ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
    ctx.strokeStyle = i % 5 === 0 ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = i % 5 === 0 ? 2 : 1;
    ctx.stroke();
  }

  // Colored arc
  const speedAngle = angleStart + pct * angleRange;
  const arcR = radius - 7;
  const arcW = 5;
  // Green zone (0-50%)
  ctx.beginPath();
  ctx.arc(cx, cy, arcR, angleStart, angleStart + Math.min(pct, 0.5) / 1 * angleRange);
  ctx.strokeStyle = '#76ff03';
  ctx.lineWidth = arcW;
  ctx.stroke();
  // Yellow zone (50-80%)
  if (pct > 0.5) {
    ctx.beginPath();
    ctx.arc(cx, cy, arcR, angleStart + 0.5 * angleRange, angleStart + Math.min(pct, 0.8) * angleRange);
    ctx.strokeStyle = '#f7c948';
    ctx.lineWidth = arcW;
    ctx.stroke();
  }
  // Red zone (80-100%)
  if (pct > 0.8) {
    ctx.beginPath();
    ctx.arc(cx, cy, arcR, angleStart + 0.8 * angleRange, speedAngle);
    ctx.strokeStyle = '#ff1744';
    ctx.lineWidth = arcW;
    ctx.stroke();
  }

  // Needle
  const needleLen = radius - 16;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(speedAngle) * needleLen, cy + Math.sin(speedAngle) * needleLen);
  ctx.strokeStyle = '#f7c948';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Center cap
  ctx.beginPath();
  ctx.arc(cx, cy, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = '#f7c948';
  ctx.fill();

  // KM/H label
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = `${radius * 0.13}px sans-serif`;
  ctx.textBaseline = 'top';
  ctx.fillText('KM/H', cx, cy + radius * 0.32);
}

// ===================== RENDER =====================
function render() {
  ctx.save();

  if (shakeIntensity > 0.5) {
    ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
  }

  drawBackground(totalDistance);
  drawRoad(playerPos, playerX);
  drawScenery();
  drawObstacles();

  // Speed lines
  if (speed > maxSpeed * 0.6) {
    const intensity = (speed / maxSpeed - 0.6) / 0.4;
    ctx.strokeStyle = `rgba(255,255,255,${intensity * 0.08})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
      const lx = Math.random() * W;
      const ly = Math.random() * H * 0.5;
      const ll = 10 + Math.random() * 40 * intensity;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx, ly + ll); ctx.stroke();
    }
  }

  // Car
  const carW = Math.max(28, W * 0.055);
  const carH = carW * 1.5;
  const targetX = W/2 + playerX * 0.08 - carW/2;
  const targetY = H * 0.7;
  const clampedX = Math.max(5, Math.min(W - carW - 5, targetX));
  drawCar(clampedX, targetY, carW, carH, leanAngle, 0, isOffroad);

  // Avatar on top of car so it's always visible
  drawAvatarCollectible();

  drawParticles();

  // Off-road vignette
  if (isOffroad) {
    const flashIntensity = Math.min(0.3, offroadTimer * 0.02);
    const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
    grad.addColorStop(0, 'rgba(255,0,0,0)');
    grad.addColorStop(1, `rgba(255,0,0,${flashIntensity})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();

  drawScorePopups();

  if (collisionFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${collisionFlash * 0.3})`;
    ctx.fillRect(0, 0, W, H);
  }

  drawSpeedometer();

  // HUD updates
  document.getElementById('lifeCornerFill').style.width = life + '%';
  document.getElementById('scoreFrameValue').textContent = Math.floor(score).toLocaleString();
  document.getElementById('levelDisplay').textContent = `NIVEL ${level}`;
}

// ===================== MAIN LOOP =====================
function loop() {
  if (!gameRunning) return;
  if (!paused) update();
  render();
  requestAnimationFrame(loop);
}

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

console.log('🏎️ Pepe Turbo Racer loaded!');
</script>
